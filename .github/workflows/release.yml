name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # ZWINGEND ERFORDERLICH für npm OIDC / Trusted Publisher und Provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # Keine registry-url hier deklarieren, um "Failed to replace env in config: ${NODE_AUTH_TOKEN}"
          # während des npm ci-Schritts zu verhindern. Changesets verwaltet die Registry-Ausrichtung selbst.

      - name: Install dependencies
        run: npm ci

      - name: Run validation
        run: npm run validate

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          publish: npm run changeset:publish
          title: "chore: release packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ermöglicht sowohl Token-basiertes Publizieren (falls NPM_TOKEN als Secret existiert)
          # als auch vollautomatisches, passwortloses OIDC Trusted Publishing (falls NPM_TOKEN leer ist).
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
